<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 2 – Прохладный морской</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #e0f2fe;
            background-image:
                /* холодные голубые волны */
                linear-gradient(
                    135deg,
                    rgba(56, 189, 248, 0.0) 0%,
                    rgba(56, 189, 248, 0.45) 20%,
                    rgba(56, 189, 248, 0.0) 40%,
                    rgba(56, 189, 248, 0.4) 60%,
                    rgba(56, 189, 248, 0.0) 80%
                ),
                /* глубокие сине-фиолетовые волны */
                linear-gradient(
                    135deg,
                    rgba(37, 99, 235, 0.0) 10%,
                    rgba(37, 99, 235, 0.5) 30%,
                    rgba(37, 99, 235, 0.0) 50%,
                    rgba(129, 140, 248, 0.55) 70%,
                    rgba(129, 140, 248, 0.0) 90%
                ),
                /* мягкие светлые блики */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.7) 0%,
                    rgba(255, 255, 255, 0.0) 40%,
                    rgba(240, 249, 255, 0.9) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
