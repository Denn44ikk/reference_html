<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 13 – Очень мягкий светлый</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fefce8;
            background-image:
                /* едва заметные персиковые волны */
                linear-gradient(
                    135deg,
                    rgba(254, 249, 195, 0.0) 0%,
                    rgba(254, 249, 195, 0.55) 24%,
                    rgba(254, 249, 195, 0.0) 48%,
                    rgba(254, 240, 199, 0.5) 72%,
                    rgba(254, 249, 195, 0.0) 96%
                ),
                /* лёгкий розовый оттенок */
                linear-gradient(
                    135deg,
                    rgba(255, 228, 230, 0.0) 14%,
                    rgba(255, 228, 230, 0.5) 34%,
                    rgba(254, 205, 211, 0.0) 58%,
                    rgba(254, 205, 211, 0.45) 82%
                ),
                /* почти белые блики */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.95) 0%,
                    rgba(255, 255, 255, 0.0) 40%,
                    rgba(255, 253, 230, 1) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
