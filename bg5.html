<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 5 – Контрастный неоновый</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #020617;
            background-image:
                /* неоново‑розовые волны */
                linear-gradient(
                    135deg,
                    rgba(244, 114, 182, 0.0) 0%,
                    rgba(244, 114, 182, 0.55) 22%,
                    rgba(244, 114, 182, 0.0) 44%,
                    rgba(236, 72, 153, 0.55) 66%,
                    rgba(244, 114, 182, 0.0) 88%
                ),
                /* циановые и лаймовые волны */
                linear-gradient(
                    135deg,
                    rgba(45, 212, 191, 0.0) 8%,
                    rgba(45, 212, 191, 0.55) 28%,
                    rgba(190, 242, 100, 0.0) 48%,
                    rgba(190, 242, 100, 0.55) 72%,
                    rgba(45, 212, 191, 0.0) 92%
                ),
                /* глубокий тёмный отблеск */
                linear-gradient(
                    135deg,
                    rgba(15, 23, 42, 0.9) 0%,
                    rgba(15, 23, 42, 0.0) 40%,
                    rgba(15, 23, 42, 1) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
