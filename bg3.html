<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 3 – Нежный пастельный</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fdf2ff;
            background-image:
                /* розово‑персиковые волны */
                linear-gradient(
                    135deg,
                    rgba(251, 113, 133, 0.0) 0%,
                    rgba(251, 113, 133, 0.35) 18%,
                    rgba(251, 113, 133, 0.0) 38%,
                    rgba(248, 187, 208, 0.45) 62%,
                    rgba(251, 113, 133, 0.0) 82%
                ),
                /* лавандово‑голубые волны */
                linear-gradient(
                    135deg,
                    rgba(167, 139, 250, 0.0) 8%,
                    rgba(167, 139, 250, 0.5) 28%,
                    rgba(129, 199, 212, 0.0) 48%,
                    rgba(129, 199, 212, 0.5) 72%,
                    rgba(167, 139, 250, 0.0) 92%
                ),
                /* мягкий молочный отблеск */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.75) 0%,
                    rgba(255, 255, 255, 0.0) 42%,
                    rgba(255, 250, 240, 0.9) 82%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>

</body>
</html>
