<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 11 – Мягкий абрикос</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fff7ed;
            background-image:
                /* абрикосовые волны */
                linear-gradient(
                    135deg,
                    rgba(254, 215, 170, 0.0) 0%,
                    rgba(254, 215, 170, 0.7) 22%,
                    rgba(254, 215, 170, 0.0) 44%,
                    rgba(253, 186, 116, 0.6) 66%,
                    rgba(254, 215, 170, 0.0) 88%
                ),
                /* лёгкий розово‑персиковый фон */
                linear-gradient(
                    135deg,
                    rgba(254, 202, 202, 0.0) 12%,
                    rgba(254, 202, 202, 0.5) 32%,
                    rgba(254, 205, 211, 0.0) 56%,
                    rgba(254, 205, 211, 0.55) 80%
                ),
                /* мягкий светлый слой */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.85) 0%,
                    rgba(255, 255, 255, 0.0) 40%,
                    rgba(255, 247, 237, 0.95) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
