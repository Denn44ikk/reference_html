<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 10 – Персик с розовым акцентом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fffaf0;
            background-image:
                /* плавные персиковые волны */
                linear-gradient(
                    135deg,
                    rgba(253, 224, 171, 0.0) 0%,
                    rgba(253, 224, 171, 0.7) 24%,
                    rgba(253, 224, 171, 0.0) 48%,
                    rgba(251, 191, 36, 0.5) 72%,
                    rgba(253, 224, 171, 0.0) 96%
                ),
                /* розовый мягкий шлейф */
                linear-gradient(
                    135deg,
                    rgba(254, 202, 202, 0.0) 14%,
                    rgba(254, 202, 202, 0.6) 34%,
                    rgba(252, 165, 165, 0.0) 58%,
                    rgba(252, 165, 165, 0.55) 82%
                ),
                /* светлые почти белые полосы */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.9) 0%,
                    rgba(255, 255, 255, 0.0) 40%,
                    rgba(255, 250, 240, 0.95) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
