<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 1 – Тёплый свежий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fffaf0;
            background-image:
                /* тёплые апельсиновые волны */
                linear-gradient(
                    135deg,
                    rgba(255, 186, 120, 0.0) 0%,
                    rgba(255, 186, 120, 0.5) 20%,
                    rgba(255, 186, 120, 0.0) 40%,
                    rgba(255, 186, 120, 0.45) 60%,
                    rgba(255, 186, 120, 0.0) 80%
                ),
                /* мягкие лаймовые волны */
                linear-gradient(
                    135deg,
                    rgba(190, 242, 100, 0.0) 10%,
                    rgba(190, 242, 100, 0.5) 30%,
                    rgba(190, 242, 100, 0.0) 50%,
                    rgba(190, 242, 100, 0.45) 70%,
                    rgba(190, 242, 100, 0.0) 90%
                ),
                /* светлые кремовые блики */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.7) 0%,
                    rgba(255, 255, 255, 0.0) 40%,
                    rgba(255, 255, 255, 0.8) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
