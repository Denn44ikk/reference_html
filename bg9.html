<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 9 – Тёплый закат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fff7ed;
            background-image:
                /* кораллово‑розовые полосы */
                linear-gradient(
                    135deg,
                    rgba(253, 164, 175, 0.0) 0%,
                    rgba(253, 164, 175, 0.65) 22%,
                    rgba(253, 164, 175, 0.0) 44%,
                    rgba(248, 113, 113, 0.55) 66%,
                    rgba(253, 164, 175, 0.0) 88%
                ),
                /* тёплый оранжево‑кремовый слой */
                linear-gradient(
                    135deg,
                    rgba(254, 202, 202, 0.0) 12%,
                    rgba(254, 202, 202, 0.5) 32%,
                    rgba(254, 215, 170, 0.0) 56%,
                    rgba(251, 191, 36, 0.45) 80%
                ),
                /* светлый мягкий отблеск */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.85) 0%,
                    rgba(255, 255, 255, 0.0) 42%,
                    rgba(255, 248, 237, 0.95) 82%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
