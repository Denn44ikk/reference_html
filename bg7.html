<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 7 – Тёплый розовый шёлк</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fff1f2;
            background-image:
                /* мягкие розовые волны */
                linear-gradient(
                    135deg,
                    rgba(254, 205, 211, 0.0) 0%,
                    rgba(254, 205, 211, 0.7) 22%,
                    rgba(254, 205, 211, 0.0) 44%,
                    rgba(251, 113, 133, 0.5) 66%,
                    rgba(254, 205, 211, 0.0) 88%
                ),
                /* персиково‑кремовый слой */
                linear-gradient(
                    135deg,
                    rgba(255, 237, 213, 0.0) 12%,
                    rgba(255, 237, 213, 0.7) 32%,
                    rgba(254, 215, 170, 0.0) 56%,
                    rgba(254, 215, 170, 0.6) 80%
                ),
                /* светлые бликовые полосы */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.85) 0%,
                    rgba(255, 255, 255, 0.0) 40%,
                    rgba(255, 240, 245, 0.9) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
