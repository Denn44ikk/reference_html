<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 4 – Тёмный мягкий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #020617;
            background-image:
                /* глубокие фиолетовые волны */
                linear-gradient(
                    135deg,
                    rgba(55, 48, 163, 0.0) 0%,
                    rgba(55, 48, 163, 0.55) 20%,
                    rgba(55, 48, 163, 0.0) 40%,
                    rgba(30, 64, 175, 0.5) 60%,
                    rgba(30, 64, 175, 0.0) 80%
                ),
                /* изумрудно‑бирюзовые волны */
                linear-gradient(
                    135deg,
                    rgba(16, 185, 129, 0.0) 10%,
                    rgba(16, 185, 129, 0.5) 30%,
                    rgba(13, 148, 136, 0.0) 50%,
                    rgba(45, 212, 191, 0.55) 70%,
                    rgba(13, 148, 136, 0.0) 90%
                ),
                /* лёгкие тёмные блики */
                linear-gradient(
                    135deg,
                    rgba(15, 23, 42, 0.8) 0%,
                    rgba(15, 23, 42, 0.0) 40%,
                    rgba(15, 23, 42, 0.9) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
