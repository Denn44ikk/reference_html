<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 6 – Персиковые волны</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fff7ed;
            background-image:
                /* светлые персиковые полосы */
                linear-gradient(
                    135deg,
                    rgba(254, 215, 170, 0.0) 0%,
                    rgba(254, 215, 170, 0.7) 25%,
                    rgba(254, 215, 170, 0.0) 50%,
                    rgba(253, 186, 116, 0.65) 75%,
                    rgba(253, 186, 116, 0.0) 100%
                ),
                /* мягкий розовый слой */
                linear-gradient(
                    135deg,
                    rgba(252, 165, 165, 0.0) 10%,
                    rgba(252, 165, 165, 0.6) 35%,
                    rgba(252, 165, 165, 0.0) 60%,
                    rgba(254, 202, 202, 0.6) 85%
                ),
                /* кремовые блики */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.8) 0%,
                    rgba(255, 255, 255, 0.0) 40%,
                    rgba(255, 247, 237, 0.9) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
