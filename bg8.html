<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 8 – Более светлый кремовый</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fffbeb;
            background-image:
                /* мягкие светло‑жёлтые волны */
                linear-gradient(
                    135deg,
                    rgba(254, 243, 199, 0.0) 0%,
                    rgba(254, 243, 199, 0.7) 24%,
                    rgba(254, 243, 199, 0.0) 48%,
                    rgba(253, 224, 171, 0.65) 72%,
                    rgba(254, 243, 199, 0.0) 96%
                ),
                /* лёгкий персиковый акцент */
                linear-gradient(
                    135deg,
                    rgba(254, 215, 170, 0.0) 14%,
                    rgba(254, 215, 170, 0.6) 34%,
                    rgba(253, 186, 116, 0.0) 58%,
                    rgba(253, 186, 116, 0.55) 82%
                ),
                /* почти белые блики */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.9) 0%,
                    rgba(255, 255, 255, 0.0) 40%,
                    rgba(255, 252, 235, 0.95) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
