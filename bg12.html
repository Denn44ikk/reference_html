<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фон 12 – Тёплый мягкий градиент</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #fffaf0;
            background-image:
                /* плавные пастельно‑оранжевые волны */
                linear-gradient(
                    135deg,
                    rgba(255, 224, 178, 0.0) 0%,
                    rgba(255, 224, 178, 0.7) 24%,
                    rgba(255, 224, 178, 0.0) 48%,
                    rgba(255, 204, 128, 0.6) 72%,
                    rgba(255, 224, 178, 0.0) 96%
                ),
                /* мягкий розово‑апельсиновый слой */
                linear-gradient(
                    135deg,
                    rgba(255, 204, 188, 0.0) 14%,
                    rgba(255, 204, 188, 0.6) 34%,
                    rgba(255, 171, 145, 0.0) 58%,
                    rgba(255, 171, 145, 0.55) 82%
                ),
                /* светлый воздушный отблеск */
                linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.9) 0%,
                    rgba(255, 255, 255, 0.0) 40%,
                    rgba(255, 248, 240, 0.95) 80%
                );
            background-size: 140% 140%, 160% 160%, 180% 180%;
            background-position: 0% 100%, 10% 90%, 20% 80%;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
</body>
</html>
